name: manual-remote-deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "서버에 반영할 이미지 태그"
        required: true
        type: string
      deploy_user:
        description: "SSH 사용자명. 비우면 플레이스홀더를 사용합니다."
        required: false
        type: string
      deploy_host:
        description: "SSH 호스트. 비우면 플레이스홀더를 사용합니다."
        required: false
        type: string
      deploy_port:
        description: "SSH 포트. 비우면 22를 사용합니다."
        required: false
        type: string
      public_domain:
        description: "배포 확인용 공개 도메인. 비우면 deploy_host 값을 사용합니다."
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: neizzz
  DEPLOY_PATH: /opt/pkpkdupr

jobs:
  summarize_manual_remote_deploy:
    name: Summarize manual remote deploy steps
    runs-on: ubuntu-latest

    steps:
      - name: Resolve manual deploy placeholders
        run: |
          if [ -n "${{ inputs.deploy_user }}" ]; then
            echo "DEPLOY_USER_VALUE=${{ inputs.deploy_user }}" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_USER_VALUE=<DEPLOY_USER>" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ inputs.deploy_host }}" ]; then
            echo "DEPLOY_HOST_VALUE=${{ inputs.deploy_host }}" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_HOST_VALUE=<DEPLOY_HOST>" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ inputs.deploy_port }}" ]; then
            echo "DEPLOY_PORT_VALUE=${{ inputs.deploy_port }}" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_PORT_VALUE=22" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ inputs.public_domain }}" ]; then
            echo "TARGET_DOMAIN=${{ inputs.public_domain }}" >> "$GITHUB_ENV"
          elif [ -n "${{ inputs.deploy_host }}" ]; then
            echo "TARGET_DOMAIN=${{ inputs.deploy_host }}" >> "$GITHUB_ENV"
          else
            echo "TARGET_DOMAIN=<PUBLIC_DOMAIN_OR_DEPLOY_HOST>" >> "$GITHUB_ENV"
          fi

      - name: Summarize manual remote deploy commands
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Manual remote deploy

          - Image tag: \`${{ inputs.image_tag }}\`
          - Web: \`${REGISTRY}/${IMAGE_NAMESPACE}/pkpkdupr-web:${{ inputs.image_tag }}\`
          - Admin web: \`${REGISTRY}/${IMAGE_NAMESPACE}/pkpkdupr-admin-web:${{ inputs.image_tag }}\`
          - API: \`${REGISTRY}/${IMAGE_NAMESPACE}/pkpkdupr-api:${{ inputs.image_tag }}\`
          - DB server: \`${REGISTRY}/${IMAGE_NAMESPACE}/pkpkdupr-db-server:${{ inputs.image_tag }}\`

          ## 1) Prepare SSH access manually

          - private key / agent / known_hosts
          - target: \`${DEPLOY_USER_VALUE}@${DEPLOY_HOST_VALUE}\`
          - port: \`${DEPLOY_PORT_VALUE}\`

          ## 2) Sync deploy files to the server

          \`\`\`bash
          ssh -p "${DEPLOY_PORT_VALUE}" ${DEPLOY_USER_VALUE}@${DEPLOY_HOST_VALUE} "mkdir -p '${DEPLOY_PATH}/scripts' '${DEPLOY_PATH}/infra/monitoring' '${DEPLOY_PATH}/infra/swag'"
          scp -P "${DEPLOY_PORT_VALUE}" docker-compose.yml ${DEPLOY_USER_VALUE}@${DEPLOY_HOST_VALUE}:${DEPLOY_PATH}/docker-compose.yml
          scp -P "${DEPLOY_PORT_VALUE}" .env.example ${DEPLOY_USER_VALUE}@${DEPLOY_HOST_VALUE}:${DEPLOY_PATH}/.env.example
          scp -P "${DEPLOY_PORT_VALUE}" scripts/update-server.sh scripts/check-healthy.mjs scripts/upsert-env.sh ${DEPLOY_USER_VALUE}@${DEPLOY_HOST_VALUE}:${DEPLOY_PATH}/scripts/
          scp -P "${DEPLOY_PORT_VALUE}" -r infra/monitoring ${DEPLOY_USER_VALUE}@${DEPLOY_HOST_VALUE}:${DEPLOY_PATH}/infra/
          scp -P "${DEPLOY_PORT_VALUE}" -r infra/swag ${DEPLOY_USER_VALUE}@${DEPLOY_HOST_VALUE}:${DEPLOY_PATH}/infra/
          \`\`\`

          ## 3) SSH into the server and run the deploy

          \`\`\`bash
          ssh -p "${DEPLOY_PORT_VALUE}" ${DEPLOY_USER_VALUE}@${DEPLOY_HOST_VALUE}
          cd "${DEPLOY_PATH}"
          chmod +x scripts/update-server.sh scripts/upsert-env.sh
          [ -f .env ] || cp .env.example .env

          scripts/upsert-env.sh .env DOMAIN '${TARGET_DOMAIN}'
          scripts/upsert-env.sh .env WEB_PUBLIC_PORT '443'
          scripts/upsert-env.sh .env ADMIN_STACK_PORT '3333'
          scripts/upsert-env.sh .env VITE_API_BASE_URL 'https://${TARGET_DOMAIN}:3333'
          scripts/upsert-env.sh .env API_ADMIN_USERNAME '<API_ADMIN_USERNAME>'
          scripts/upsert-env.sh .env API_ADMIN_PASSWORD '<API_ADMIN_PASSWORD>'
          scripts/upsert-env.sh .env GF_SECURITY_ADMIN_USER '<GF_SECURITY_ADMIN_USER>'
          scripts/upsert-env.sh .env GF_SECURITY_ADMIN_PASSWORD '<GF_SECURITY_ADMIN_PASSWORD>'
          scripts/upsert-env.sh .env GF_SERVER_ROOT_URL 'https://${TARGET_DOMAIN}:3333/grafana/'

          # Option A: server already logged in to GHCR
          bash scripts/update-server.sh '${{ inputs.image_tag }}'

          # Option B: login just for this deploy
          export GHCR_USERNAME='<GHCR_USERNAME>'
          export GHCR_TOKEN='<GHCR_TOKEN>'
          bash scripts/update-server.sh '${{ inputs.image_tag }}'
          \`\`\`

          ## 4) Verify after deploy

          - Web: \`https://${TARGET_DOMAIN}/\`
          - API health: \`https://${TARGET_DOMAIN}:3333/api/health\`
          - API ping: \`https://${TARGET_DOMAIN}:3333/api/ping\`
          - Admin: \`https://${TARGET_DOMAIN}:3333/admin/\`
          - Grafana: \`https://${TARGET_DOMAIN}:3333/grafana/\`
          EOF
