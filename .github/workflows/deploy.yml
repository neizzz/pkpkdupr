name: deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "배포할 이미지 태그이자 앱 표시 버전입니다. 비워두면 현재 commit의 8자리 SHA를 사용합니다."
        required: false
        type: string
      git_ref:
        description: "체크아웃할 Git ref. 비워두면 현재 기본 ref를 사용합니다."
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: neizzz
  DEPLOY_PATH: /opt/pkpkdupr

jobs:
  build_and_push_images:
    name: Build and push images for manual remote deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source for image build
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.sha }}
          fetch-tags: true

      - name: Resolve image tag and manual deploy defaults
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
          else
            IMAGE_TAG="$(git rev-parse --short=8 HEAD)"
          fi
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          if [ -n "${{ secrets.DEPLOY_PORT }}" ]; then
            echo "DEPLOY_PORT=${{ secrets.DEPLOY_PORT }}" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_PORT=22" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.PUBLIC_DOMAIN }}" ]; then
            echo "TARGET_DOMAIN=${{ secrets.PUBLIC_DOMAIN }}" >> "$GITHUB_ENV"
          else
            echo "TARGET_DOMAIN=${{ secrets.DEPLOY_HOST }}" >> "$GITHUB_ENV"
          fi

      - name: Validate domain settings for image build
        run: |
          if [ -z "${TARGET_DOMAIN}" ]; then
            echo "PUBLIC_DOMAIN 또는 DEPLOY_HOST secret 중 하나는 필요합니다." >&2
            echo "web 이미지는 VITE_API_BASE_URL 빌드 값이 필요하므로, 수동 반영만 하더라도 대상 domain/host 설정이 있어야 합니다." >&2
            exit 1
          fi

      - name: Use image tag as app version
        run: |
          APP_VERSION="${IMAGE_TAG}"
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          echo "App version matches image tag: ${APP_VERSION}"

      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          build-args: |
            VITE_API_BASE_URL=${{ secrets.PUBLIC_DOMAIN != '' && format('https://{0}:3333', secrets.PUBLIC_DOMAIN) || secrets.DEPLOY_HOST != '' && format('https://{0}:3333', secrets.DEPLOY_HOST) || '' }}
            VITE_APP_VERSION=${{ env.APP_VERSION }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/pkpkdupr-web:${{ env.IMAGE_TAG }}

      - name: Build and push admin-web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin-web/Dockerfile
          build-args: |
            VITE_APP_VERSION=${{ env.APP_VERSION }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/pkpkdupr-admin-web:${{ env.IMAGE_TAG }}

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/pkpkdupr-api:${{ env.IMAGE_TAG }}

      - name: Build and push db-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/db-server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/pkpkdupr-db-server:${{ env.IMAGE_TAG }}

      - name: Summarize pushed images and manual remote deploy steps
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## 배포용 이미지 push 완료

          이 워크플로는 배포 가능한 이미지를 **빌드하고 GHCR에 push만** 합니다.
          서버 SSH 접속, 서버 repo 최신화, 실제 원격 배포 명령 실행은 **직접 수동으로** 진행해야 합니다.

          - 이미지 태그: \`${IMAGE_TAG}\`
          - 앱 표시 버전: \`${APP_VERSION}\` (이미지 태그와 동일)
          - Web: \`${REGISTRY}/${IMAGE_NAMESPACE}/pkpkdupr-web:${IMAGE_TAG}\`
          - Admin Web: \`${REGISTRY}/${IMAGE_NAMESPACE}/pkpkdupr-admin-web:${IMAGE_TAG}\`
          - API: \`${REGISTRY}/${IMAGE_NAMESPACE}/pkpkdupr-api:${IMAGE_TAG}\`
          - DB Server: \`${REGISTRY}/${IMAGE_NAMESPACE}/pkpkdupr-db-server:${IMAGE_TAG}\`
          - 수동 배포 대상 도메인: \`${TARGET_DOMAIN}\`

          ## 수동 배포 가이드

          1. 로컬 환경에서 SSH 접속 준비를 합니다.
             - private key / ssh-agent / known_hosts 상태 확인
             - 접속 대상: \`<DEPLOY_USER>@<DEPLOY_HOST>\`
             - 포트: \`${DEPLOY_PORT}\`

          2. 서버에 SSH 접속한 뒤 배포 repo를 준비합니다.
             - 최초 1회라면 \`${DEPLOY_PATH}\`에 repo를 clone 합니다.
             - 이미 repo가 있다면 \`git pull\`로 최신 상태를 받습니다.

          \`\`\`bash
          ssh -p "${DEPLOY_PORT}" <DEPLOY_USER>@<DEPLOY_HOST>

          # 최초 1회
          mkdir -p "$(dirname "${DEPLOY_PATH}")"
          git clone <REPO_URL> "${DEPLOY_PATH}"

          # 이미 clone 되어 있다면
          cd "${DEPLOY_PATH}"
          git pull
          \`\`\`

          3. \`${DEPLOY_PATH}\`에서 배포를 실행합니다.
             - 최초 설치 시에만 \`.env.example\`을 \`.env\`로 복사하고, 실제 운영 값(도메인, DuckDNS 토큰, JWT secret, 관리자 계정, sqlite-web 비밀번호)을 직접 설정합니다.
             - \`scripts/manual-deploy.sh\`는 기존 \`${DEPLOY_PATH}/.env\`를 변경하지 않습니다.
             - 최초 설치, 인증서/SWAG 설정 생성 또는 런타임 설정 복구가 필요하면 \`scripts/install-server.sh\`를 먼저 실행합니다.

          \`\`\`bash
          cd "${DEPLOY_PATH}"
          chmod +x scripts/install-server.sh scripts/manual-deploy.sh scripts/update-server.sh
          [ -f .env ] || cp .env.example .env

          # 최초 설치 또는 인증서/SWAG 설정 복구가 필요한 경우
          bash scripts/install-server.sh

          # 일반 배포: 서버에 GHCR 로그인 상태가 이미 있는 경우
          bash scripts/manual-deploy.sh --image-tag '${IMAGE_TAG}'

          # 이번 배포에만 GHCR 자격증명을 함께 넘기고 싶다면
          bash scripts/manual-deploy.sh \\
            --image-tag '${IMAGE_TAG}' \\
            --ghcr-username '<GHCR_USERNAME>' \\
            --ghcr-token '<GHCR_TOKEN>'
          \`\`\`

          4. 배포 후 아래 URL로 정상 동작을 확인합니다.

          - Web: \`https://${TARGET_DOMAIN}/\`
          - API health: \`https://${TARGET_DOMAIN}:3333/api/health\`
          - API ping: \`https://${TARGET_DOMAIN}:3333/api/ping\`
          - Admin: \`https://${TARGET_DOMAIN}:3333/admin/\`
          - Uptime Kuma: \`https://${TARGET_DOMAIN}:3333/uptime/\`
          - sqlite-web (read-only): \`https://${TARGET_DOMAIN}:3333/db/\`
          EOF
