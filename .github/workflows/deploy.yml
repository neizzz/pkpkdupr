name: deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "배포할 이미지 태그. 비워두면 현재 commit SHA를 사용합니다."
        required: false
        type: string
      git_ref:
        description: "체크아웃할 Git ref. 비워두면 현재 기본 ref를 사용합니다."
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: neizzz
  DEPLOY_PATH: /opt/pkpkdupr

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.sha }}

      - name: Resolve image tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "IMAGE_TAG=${{ inputs.image_tag }}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.DEPLOY_PORT }}" ]; then
            echo "DEPLOY_PORT=${{ secrets.DEPLOY_PORT }}" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_PORT=22" >> "$GITHUB_ENV"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          build-args: |
            VITE_API_BASE_URL=https://${{ secrets.PUBLIC_DOMAIN != '' && secrets.PUBLIC_DOMAIN || secrets.DEPLOY_HOST }}:3333
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/pkpkdupr-web:${{ env.IMAGE_TAG }}

      - name: Build and push admin-web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin-web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/pkpkdupr-admin-web:${{ env.IMAGE_TAG }}

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/pkpkdupr-api:${{ env.IMAGE_TAG }}

      - name: Build and push db-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/db-server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/pkpkdupr-db-server:${{ env.IMAGE_TAG }}

      - name: Setup SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync deploy files to server
        run: |
          ssh -p "${DEPLOY_PORT}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "mkdir -p '${{ env.DEPLOY_PATH }}/scripts' '${{ env.DEPLOY_PATH }}/infra/monitoring' '${{ env.DEPLOY_PATH }}/infra/swag'"
          scp -P "${DEPLOY_PORT}" docker-compose.yml "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/docker-compose.yml"
          scp -P "${DEPLOY_PORT}" .env.example "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/.env.example"
          scp -P "${DEPLOY_PORT}" scripts/update-server.sh scripts/check-healthy.mjs scripts/upsert-env.sh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/scripts/"
          scp -P "${DEPLOY_PORT}" -r infra/monitoring "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/infra/"
          scp -P "${DEPLOY_PORT}" -r infra/swag "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/infra/"

      - name: Deploy on server
        run: |
          ssh -p "${DEPLOY_PORT}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "
            set -euo pipefail
            cd '${{ env.DEPLOY_PATH }}'
            chmod +x scripts/update-server.sh scripts/upsert-env.sh
            if [ ! -f .env ]; then
              cp .env.example .env
            fi
            scripts/upsert-env.sh .env DOMAIN '${{ secrets.PUBLIC_DOMAIN != '' && secrets.PUBLIC_DOMAIN || secrets.DEPLOY_HOST }}'
            scripts/upsert-env.sh .env WEB_PUBLIC_PORT '443'
            scripts/upsert-env.sh .env ADMIN_STACK_PORT '3333'
            scripts/upsert-env.sh .env VITE_API_BASE_URL 'https://${{ secrets.PUBLIC_DOMAIN != '' && secrets.PUBLIC_DOMAIN || secrets.DEPLOY_HOST }}:3333'
            scripts/upsert-env.sh .env API_ADMIN_USERNAME '${{ secrets.API_ADMIN_USERNAME != '' && secrets.API_ADMIN_USERNAME || 'admin' }}'
            scripts/upsert-env.sh .env API_ADMIN_PASSWORD '${{ secrets.API_ADMIN_PASSWORD != '' && secrets.API_ADMIN_PASSWORD || 'admin123qwe' }}'
            scripts/upsert-env.sh .env GF_SECURITY_ADMIN_USER '${{ secrets.GF_SECURITY_ADMIN_USER != '' && secrets.GF_SECURITY_ADMIN_USER || 'admin' }}'
            scripts/upsert-env.sh .env GF_SECURITY_ADMIN_PASSWORD '${{ secrets.GF_SECURITY_ADMIN_PASSWORD != '' && secrets.GF_SECURITY_ADMIN_PASSWORD || 'admin123qwe' }}'
            scripts/upsert-env.sh .env GF_SERVER_ROOT_URL 'https://${{ secrets.PUBLIC_DOMAIN != '' && secrets.PUBLIC_DOMAIN || secrets.DEPLOY_HOST }}:3333/grafana/'
            export GHCR_USERNAME='${{ github.actor }}'
            export GHCR_TOKEN='${{ github.token }}'
            export IMAGE_TAG='${{ env.IMAGE_TAG }}'
            bash scripts/update-server.sh '${{ env.IMAGE_TAG }}'
          "
