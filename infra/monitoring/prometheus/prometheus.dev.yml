global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "pkpkdupr_api"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:4000"]
        labels:
          instance: "pkpkdupr-api-dev"

  - job_name: "sqlite_exporter"
    static_configs:
      - targets: ["db-exporter:9697"]
        labels:
          instance: "pkpkdupr-db-dev"
