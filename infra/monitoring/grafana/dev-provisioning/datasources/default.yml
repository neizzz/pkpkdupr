apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: SQLite Dev DB
    uid: sqlite_dev_db
    type: frser-sqlite-datasource
    access: proxy
    editable: true
    jsonData:
      path: /var/lib/pkpkdupr/db/db.sqlite
      pathOptions: mode=ro
