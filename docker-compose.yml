services:
   # 🔒 Reverse Proxy & SSL (Let's Encrypt) - DuckDNS DNS 검증 사용
  proxy:
    image: linuxserver/swag:latest
    container_name: pkpkdupr-proxy
    cap_add:
        - NET_ADMIN
    volumes:
        - ${PKPKDUPR_DEPLOY_PATH:-.}/data/certs:/config
    environment:
        - PUID=1000
        - PGID=1000
        - TZ=Asia/Seoul
        - URL=${DOMAIN:-pkpkdupr.duckdns.org}
        - VALIDATION=dns
        - DNSPLUGIN=duckdns
        - DUCKDNSTOKEN=${DUCKDNSTOKEN}
        - SUBDOMAINS= # 현재는 기본 도메인만 사용하므로 비워둠
    ports:
        - "${WEB_PUBLIC_PORT:-443}:443"
        - "${ADMIN_STACK_PORT:-3333}:3333"
    networks:
        - pkpkdupr-network

   # 🌐 Web Application (Internal Only)
  web:
    image: ghcr.io/${GHCR_NAMESPACE:-neizzz}/pkpkdupr-web:${IMAGE_TAG:-latest}
    container_name: pkpkdupr-web-app
    depends_on:
        - proxy
    networks:
        - pkpkdupr-network

  admin-web:
    image: ghcr.io/${GHCR_NAMESPACE:-neizzz}/pkpkdupr-admin-web:${IMAGE_TAG:-latest}
    container_name: pkpkdupr-admin-web-app
    depends_on:
        - proxy
    networks:
        - pkpkdupr-network

   # ⚙️ API Server (Internal Only)
  api:
    image: ghcr.io/${GHCR_NAMESPACE:-neizzz}/pkpkdupr-api:${IMAGE_TAG:-latest}
    container_name: pkpkdupr-api-server
    environment:
        - NODE_ENV=production
        - DB_SERVER_URL=http://db-server:5001
        - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
        - DOMAIN=${DOMAIN:-pkpkdupr.duckdns.org}
        - WEB_PUBLIC_PORT=${WEB_PUBLIC_PORT:-443}
        - ADMIN_STACK_PORT=${ADMIN_STACK_PORT:-3333}
        - API_ADMIN_USERNAME=${API_ADMIN_USERNAME:-admin}
        - API_ADMIN_PASSWORD=${API_ADMIN_PASSWORD:-admin123qwe}
        - AVATAR_UPLOAD_DIR=/app/data/uploads/avatars
    volumes:
        # API가 /uploads/avatars/*로 서빙하는 프로필 이미지 영구 저장소입니다.
        # 운영 reverse proxy는 /uploads/avatars/* 요청을 api:4000으로 전달해야 합니다.
        - ${PKPKDUPR_DEPLOY_PATH:-.}/data/uploads/avatars:/app/data/uploads/avatars
    depends_on:
        - db-server
    expose:
        - "4000"
    networks:
        - pkpkdupr-network

   # 💾 Database Server (SQLite)
  db-server:
    image: ghcr.io/${GHCR_NAMESPACE:-neizzz}/pkpkdupr-db-server:${IMAGE_TAG:-latest}
    container_name: pkpkdupr-db-server
    environment:
        - DB_FILE_PATH=file:/app/data/db.sqlite
    volumes:
        - ${PKPKDUPR_DEPLOY_PATH:-.}/data/db:/app/data # SQLite 파일 영구 보관을 위해 외부 저장소 마운트
    expose:
        - "5001"
    networks:
        - pkpkdupr-network

  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: pkpkdupr-uptime-kuma
    volumes:
      - uptime-kuma-data:/app/data
    expose:
      - "3001"
    networks:
      - pkpkdupr-network

  sqlite-web:
    image: ghcr.io/coleifer/sqlite-web:latest
    container_name: pkpkdupr-sqlite-web
    volumes:
      - ${PKPKDUPR_DEPLOY_PATH:-.}/data/db:/data:ro
    environment:
      - SQLITE_WEB_PASSWORD=${SQLITE_WEB_PASSWORD:-change-me}
    command:
      - /data/db.sqlite
      - --host=0.0.0.0
      - --port=8080
      - --read-only
      - --url-prefix=/db/
    expose:
      - "8080"
    depends_on:
      - db-server
    networks:
      - pkpkdupr-network

networks:
  pkpkdupr-network:
    driver: bridge

volumes:
  uptime-kuma-data:
